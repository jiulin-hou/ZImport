[server]
listen_host = 127.0.0.1
listen_port = 8088
secret_key = CHANGE-ME-TO-RANDOM-STRING

[zimbra]
soap_url = https://mail.msauto.com.cn:8443/service/soap
admin_soap_url = https://mail.msauto.com.cn:7071/service/admin/soap
rest_base = https://mail.msauto.com.cn:8443
verify_tls = true

[service_account]
name = importsvc@msauto.com.cn
password = CHANGE-ME

[storage]
temp_root = /var/lib/zimport/tmp
db_path = /var/lib/zimport/tasks.db
max_task_bytes = 10737418240
retention_days = 7

[scheduler]
concurrency = 1
queue_limit = 50

[upload]
chunk_size = 10485760
